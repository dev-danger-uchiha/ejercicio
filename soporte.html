<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soporte Técnico | Sistema de Mensajería</title>
    
    <!-- Importar fuente de Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Variables de color para mantener consistencia con el index */
        :root {
            --primary-color: #4F46E5;
            --primary-hover: #4338CA;
            --success-color: #10B981; /* Verde esmeralda para el botón de enviar */
            --success-hover: #059669;
            --text-main: #1F2937;
            --text-muted: #4B5563;
            --bg-gradient: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            --input-border: #D1D5DB;
            --input-focus: #C7D2FE;
        }

        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            margin: 0; 
            padding: 20px;
            background: var(--bg-gradient);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .form-container { 
            background-color: #ffffff;
            max-width: 500px; 
            width: 100%;
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 1.75rem;
            font-weight: 700;
            color: #111827;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label { 
            display: block; 
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px; 
        }

        input, select, textarea { 
            width: 100%; 
            padding: 12px 14px; 
            font-family: inherit;
            font-size: 1rem;
            color: var(--text-main);
            border: 1px solid var(--input-border); 
            border-radius: 8px;
            box-sizing: border-box; 
            background-color: #F9FAFB;
            transition: all 0.3s ease;
        }

        /* Efecto de foco cuando el usuario hace clic en el campo */
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: #ffffff;
            box-shadow: 0 0 0 4px var(--input-focus);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button { 
            width: 100%; 
            padding: 14px; 
            background-color: var(--success-color); 
            color: white; 
            border: none; 
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer; 
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2);
            margin-top: 10px;
        }

        button:hover { 
            background-color: var(--success-hover); 
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(16, 185, 129, 0.3);
        }

        /* Enlace para volver atrás */
        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: var(--primary-color);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Reportar un Fallo</h2>
        <p class="subtitle">Completa el formulario y te ayudaremos lo antes posible.</p>
        
        <form action="guardar_soporte.php" method="POST">
            
            <div class="form-group">
                <label for="nombres">Nombres Completos:</label>
                <input type="text" id="nombres" name="nombres" placeholder="Ej. Juan Pérez" required>
            </div>

            <div class="form-group">
                <label for="email">Correo Electrónico:</label>
                <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="form-group">
                <label for="tipo_fallo">Tipo de Fallo:</label>
                <select id="tipo_fallo" name="tipo_fallo" required>
                    <option value="" disabled selected>Seleccione una opción...</option>
                    <option value="login">Problemas de inicio de sesión</option>
                    <option value="envio">Error al enviar mensajes</option>
                    <option value="recepcion">Error al recibir mensajes</option>
                    <option value="otro">Otro problema</option>
                </select>
            </div>

            <div class="form-group">
                <label for="descripcion">Descripción detallada:</label>
                <textarea id="descripcion" name="descripcion" placeholder="Describe el problema que estás experimentando..." required></textarea>
            </div>

            <button type="submit">Enviar Reporte</button>
        </form>

        <a href="index.html" class="back-link">← Volver al inicio</a>
    </div>

</body>
</html>
