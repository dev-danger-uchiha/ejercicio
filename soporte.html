<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soporte Técnico</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .form-container { max-width: 400px; margin: auto; padding: 20px; border: 1px solid #ccc; border-radius: 10px; }
        label, input, select, textarea { display: block; width: 100%; margin-bottom: 10px; }
        input, select, textarea { padding: 8px; box-sizing: border-box; }
        button { padding: 10px; background-color: #28a745; color: white; border: none; width: 100%; cursor: pointer; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Reportar un Fallo</h2>
        <form action="guardar_soporte.php" method="POST">
            
            <label for="nombres">Nombres Completos:</label>
            <input type="text" id="nombres" name="nombres" required>

            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" name="email" required>

            <label for="tipo_fallo">Tipo de Fallo:</label>
            <select id="tipo_fallo" name="tipo_fallo" required>
                <option value="">Seleccione una opción...</option>
                <option value="login">Problemas de inicio de sesión</option>
                <option value="envio">Error al enviar mensajes</option>
                <option value="recepcion">Error al recibir mensajes</option>
                <option value="otro">Otro problema</option>
            </select>

            <label for="descripcion">Descripción detallada:</label>
            <textarea id="descripcion" name="descripcion" rows="4" required></textarea>

            <button type="submit">Enviar Reporte</button>
        </form>
    </div>

</body>
</html>
